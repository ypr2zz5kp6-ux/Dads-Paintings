<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Gallery of His Work</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --wall:#ECE6D8;
    --wall-deep:#E2DAC8;
    --ink:#2B2620;
    --ink-soft:#5A5246;
    --brass:#A8763E;
    --forest:#3E4A40;
    --mat:#FAF8F2;
    --shadow: 0 12px 28px rgba(43,38,32,0.18), 0 2px 6px rgba(43,38,32,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 10% -10%, var(--wall-deep), transparent 60%),
      var(--wall);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }

  /* ---------- Header ---------- */
  header{
    padding:64px 24px 40px;
    text-align:center;
    max-width:780px;
    margin:0 auto;
  }
  .eyebrow{
    font-family:'Space Mono', monospace;
    letter-spacing:0.22em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--brass);
    margin-bottom:14px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(32px, 5vw, 52px);
    line-height:1.08;
    margin:0 0 14px;
  }
  header p.sub{
    font-size:15px;
    color:var(--ink-soft);
    line-height:1.6;
    margin:0;
  }
  .rule{
    width:64px;
    height:2px;
    background:var(--brass);
    margin:26px auto 0;
    opacity:0.7;
  }

  /* ---------- Gallery grid ---------- */
  .gallery{
    max-width:1180px;
    margin:0 auto;
    padding:20px 24px 100px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(230px, 1fr));
    gap:34px;
  }
  .frame{
    cursor:pointer;
    background:var(--mat);
    padding:14px 14px 0;
    border-radius:2px;
    box-shadow:var(--shadow);
    transition:transform 0.25s ease, box-shadow 0.25s ease;
  }
  .frame:hover, .frame:focus-visible{
    transform:translateY(-4px);
    box-shadow:0 18px 34px rgba(43,38,32,0.24), 0 4px 8px rgba(43,38,32,0.12);
    outline:none;
  }
  .frame .img-wrap{
    width:100%;
    aspect-ratio:4/5;
    overflow:hidden;
    background:#ddd4bf;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .plaque{
    padding:14px 4px 16px;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:10px;
  }
  .plaque .no{
    font-family:'Space Mono', monospace;
    font-size:11px;
    color:var(--brass);
    flex-shrink:0;
  }
  .plaque .title{
    font-family:'Fraunces', serif;
    font-size:15px;
    color:var(--ink);
    text-align:right;
    line-height:1.3;
  }
  .plaque .year{
    display:block;
    font-family:'Inter', sans-serif;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:2px;
  }

  /* ---------- Empty state ---------- */
  .empty{
    grid-column:1/-1;
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    font-size:14px;
    line-height:1.7;
  }
  .empty code{
    background:var(--mat);
    padding:2px 6px;
    border-radius:3px;
    font-family:'Space Mono', monospace;
  }

  /* ---------- Lightbox ---------- */
  .lightbox{
    position:fixed;
    inset:0;
    background:rgba(20,18,14,0.96);
    display:none;
    flex-direction:column;
    z-index:100;
  }
  .lightbox.open{display:flex;}
  .lb-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 22px;
    flex-shrink:0;
  }
  .lb-back{
    font-family:'Inter', sans-serif;
    font-size:13px;
    letter-spacing:0.03em;
    color:#EDE7DB;
    background:none;
    border:1px solid rgba(237,231,219,0.3);
    padding:9px 16px;
    border-radius:20px;
    cursor:pointer;
    transition:background 0.2s;
  }
  .lb-back:hover{background:rgba(237,231,219,0.12);}
  .lb-count{
    font-family:'Space Mono', monospace;
    font-size:12px;
    color:rgba(237,231,219,0.6);
    letter-spacing:0.05em;
  }
  .lb-stage{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    padding:0 70px;
    min-height:0;
  }
  .lb-stage img{
    max-width:100%;
    max-height:78vh;
    object-fit:contain;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
  }
  .lb-nav{
    position:absolute;
    top:0;
    bottom:0;
    width:70px;
    background:none;
    border:none;
    color:#EDE7DB;
    font-size:28px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0.55;
    transition:opacity 0.2s;
  }
  .lb-nav:hover{opacity:1;}
  .lb-prev{left:0;}
  .lb-next{right:0;}
  .lb-caption{
    flex-shrink:0;
    text-align:center;
    padding:20px 20px 34px;
  }
  .lb-caption .title{
    font-family:'Fraunces', serif;
    font-size:18px;
    color:#F5F1E6;
  }
  .lb-caption .year{
    font-family:'Inter', sans-serif;
    font-size:12px;
    color:rgba(237,231,219,0.55);
    margin-top:4px;
  }

  @media (max-width:640px){
    .lb-stage{padding:0 44px;}
    .lb-nav{width:44px; font-size:22px;}
    header{padding:48px 20px 30px;}
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">A Lifetime of Work</div>
  <h1>My Father's Artwork</h1>
  <p class="sub">A collection of paintings, gathered together so they can be seen the way they deserve to be seen. Tap any piece to step closer.</p>
  <div class="rule"></div>
</header>

<main class="gallery" id="gallery">
  <!-- populated by JS -->
</main>

<div class="lightbox" id="lightbox">
  <div class="lb-top">
    <button class="lb-back" id="lbBack">&larr; Back to Gallery</button>
    <span class="lb-count" id="lbCount"></span>
  </div>
  <div class="lb-stage">
    <button class="lb-nav lb-prev" id="lbPrev" aria-label="Previous">&#8249;</button>
    <img id="lbImg" src="" alt="">
    <button class="lb-nav lb-next" id="lbNext" aria-label="Next">&#8250;</button>
  </div>
  <div class="lb-caption">
    <div class="title" id="lbTitle"></div>
    <div class="year" id="lbYear"></div>
  </div>
</div>

<script>
/* ====================================================================
   ARTWORK LIST — edit this array to add, remove, or reorder pieces.

   For each piece, paste the Google Drive FILE ID (not the folder ID).
   To get a file's ID: open the file in Drive, click "Share" > "Copy link".
   The link looks like:
     https://drive.google.com/file/d/1AbCDeFGhiJKLmnoPQRstuVWxyz/view
   The long string between /d/ and /view is the file ID.

   Each file must be shared as "Anyone with the link" (Viewer) for the
   image to load on this page — folder-level sharing alone is not
   enough for individual thumbnail/preview links to work reliably.

   title and year are optional — leave year: "" if unknown.
   ==================================================================== */
const ARTWORKS = [
  // { id: "PASTE_FILE_ID_HERE", title: "Untitled", year: "" },
  // { id: "PASTE_FILE_ID_HERE", title: "Morning on the Ridge", year: "1994" },
];

const galleryEl = document.getElementById('gallery');
const lightbox  = document.getElementById('lightbox');
const lbImg     = document.getElementById('lbImg');
const lbTitle   = document.getElementById('lbTitle');
const lbYear    = document.getElementById('lbYear');
const lbCount   = document.getElementById('lbCount');
const lbBack    = document.getElementById('lbBack');
const lbPrev    = document.getElementById('lbPrev');
const lbNext    = document.getElementById('lbNext');

let currentIndex = 0;

function thumbUrl(id){ return `https://drive.google.com/thumbnail?id=${id}&sz=w600`; }
function fullUrl(id){ return `https://drive.google.com/thumbnail?id=${id}&sz=w2000`; }

function renderGallery(){
  if(ARTWORKS.length === 0){
    galleryEl.innerHTML = `
      <div class="empty">
        This gallery is ready, but no artwork has been added yet.<br>
        Open the page's HTML and add entries to the <code>ARTWORKS</code> list near the bottom of the file.
      </div>`;
    return;
  }
  galleryEl.innerHTML = ARTWORKS.map((a, i) => `
    <div class="frame" tabindex="0" data-index="${i}">
      <div class="img-wrap">
        <img src="${thumbUrl(a.id)}" alt="${a.title || 'Untitled artwork'}" loading="lazy">
      </div>
      <div class="plaque">
        <span class="no">${String(i+1).padStart(2,'0')}</span>
        <span class="title">${a.title || 'Untitled'}${a.year ? `<span class="year">${a.year}</span>` : ''}</span>
      </div>
    </div>
  `).join('');

  galleryEl.querySelectorAll('.frame').forEach(el => {
    el.addEventListener('click', () => openLightbox(Number(el.dataset.index)));
    el.addEventListener('keydown', e => {
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openLightbox(Number(el.dataset.index)); }
    });
  });
}

function openLightbox(index){
  currentIndex = index;
  showCurrent();
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(){
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}

function showCurrent(){
  const a = ARTWORKS[currentIndex];
  lbImg.src = fullUrl(a.id);
  lbImg.alt = a.title || 'Untitled artwork';
  lbTitle.textContent = a.title || 'Untitled';
  lbYear.textContent = a.year || '';
  lbCount.textContent = `${currentIndex + 1} / ${ARTWORKS.length}`;
}

function showNext(){ currentIndex = (currentIndex + 1) % ARTWORKS.length; showCurrent(); }
function showPrev(){ currentIndex = (currentIndex - 1 + ARTWORKS.length) % ARTWORKS.length; showCurrent(); }

lbBack.addEventListener('click', closeLightbox);
lbNext.addEventListener('click', showNext);
lbPrev.addEventListener('click', showPrev);

lightbox.addEventListener('click', e => {
  if(e.target === lightbox) closeLightbox();
});

document.addEventListener('keydown', e => {
  if(!lightbox.classList.contains('open')) return;
  if(e.key === 'Escape') closeLightbox();
  if(e.key === 'ArrowRight') showNext();
  if(e.key === 'ArrowLeft') showPrev();
});

// basic swipe support for mobile
let touchStartX = null;
lightbox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
lightbox.addEventListener('touchend', e => {
  if(touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(dx > 50) showPrev();
  if(dx < -50) showNext();
  touchStartX = null;
});

renderGallery();
</script>

</body>
</html>
